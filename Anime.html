<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Floating 3D Scene</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: Arial, sans-serif;
    }
    canvas { display: block; }
    .info {
      position: fixed;
      left: 16px;
      bottom: 16px;
      color: rgba(255,255,255,0.75);
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.12);
      padding: 10px 14px;
      border-radius: 999px;
      font-size: 12px;
      backdrop-filter: blur(8px);
    }
  </style>
</head>
<body>
  <div class="info">3D floating scene test</div>

  <script type="module">
    import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.161.0/build/three.module.js";

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x000000);
    scene.fog = new THREE.Fog(0x000000, 12, 30);

    const camera = new THREE.PerspectiveCamera(
      45,
      window.innerWidth / window.innerHeight,
      0.1,
      100
    );
    camera.position.set(0, 1.2, 10);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    document.body.appendChild(renderer.domElement);

    const ambient = new THREE.AmbientLight(0xffffff, 1.0);
    scene.add(ambient);

    const dir1 = new THREE.DirectionalLight(0xffd4a3, 2.5);
    dir1.position.set(-4, 5, 6);
    scene.add(dir1);

    const dir2 = new THREE.DirectionalLight(0x88bbff, 1.3);
    dir2.position.set(5, 2, -4);
    scene.add(dir2);

    const point = new THREE.PointLight(0xff7a1a, 8, 20);
    point.position.set(2, 1, 3);
    scene.add(point);

    const world = new THREE.Group();
    scene.add(world);

    function makeCanvasTexture(drawFn, width = 1024, height = 640) {
      const canvas = document.createElement("canvas");
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext("2d");
      drawFn(ctx, width, height);
      const texture = new THREE.CanvasTexture(canvas);
      texture.colorSpace = THREE.SRGBColorSpace;
      return texture;
    }

    function roundedRect(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    function createCardTexture(kind = "dark") {
      return makeCanvasTexture((ctx, w, h) => {
        let grad = ctx.createLinearGradient(0, 0, w, h);

        if (kind === "blue") {
          grad.addColorStop(0, "#11314a");
          grad.addColorStop(0.5, "#2b7fc0");
          grad.addColorStop(1, "#11181f");
        } else if (kind === "cream") {
          grad.addColorStop(0, "#f2eadf");
          grad.addColorStop(1, "#ddd4c9");
        } else {
          grad.addColorStop(0, "#111111");
          grad.addColorStop(1, "#050505");
        }

        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, w, h);

        ctx.strokeStyle = "rgba(255,255,255,0.18)";
        ctx.lineWidth = 3;
        ctx.strokeRect(2, 2, w - 4, h - 4);

        if (kind === "blue") {
          ctx.fillStyle = "rgba(255,255,255,0.95)";
          ctx.font = "900 110px Arial";
          ctx.fillText("ANY", 70, 150);
          ctx.fillText("DAY", 70, 260);

          const g = ctx.createLinearGradient(0, 0, 0, h);
          g.addColorStop(0, "#f5d28d");
          g.addColorStop(1, "#d57525");
          ctx.fillStyle = g;
          ctx.fillRect(520, 110, 160, 250);
        }

        if (kind === "cream") {
          ctx.fillStyle = "#38291d";
          ctx.font = "italic 86px Georgia";
          ctx.fillText("Faun", 90, 180);

          ctx.strokeStyle = "rgba(50,35,20,0.45)";
          ctx.lineWidth = 8;
          ctx.beginPath();
          ctx.moveTo(720, 60);
          ctx.quadraticCurveTo(620, 200, 530, 350);
          ctx.stroke();
        }

        if (kind === "dark") {
          ctx.fillStyle = "rgba(255,255,255,0.82)";
          ctx.font = "28px Arial";
          ctx.fillText("FONTS", 44, 70);

          ctx.fillStyle = "rgba(255,255,255,0.96)";
          ctx.font = "96px Georgia";
          ctx.fillText("Heading", 40, 210);

          ctx.fillStyle = "rgba(255,255,255,0.72)";
          ctx.font = "34px Arial";
          ctx.fillText("This is your paragraph flow.", 42, 300);
        }
      });
    }

    function createLabelTexture(text) {
      return makeCanvasTexture((ctx, w, h) => {
        ctx.clearRect(0, 0, w, h);
        roundedRect(ctx, 30, 25, w - 60, h - 50, 55);
        ctx.fillStyle = "rgba(30,30,32,0.90)";
        ctx.fill();
        ctx.strokeStyle = "rgba(255,255,255,0.08)";
        ctx.lineWidth = 2;
        ctx.stroke();

        ctx.fillStyle = "rgba(255,255,255,0.88)";
        ctx.font = "bold 54px Arial";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(text, w / 2, h / 2);
      }, 512, 160);
    }

    function createPlane(texture, w, h, glass = false) {
      const geometry = new THREE.PlaneGeometry(w, h);
      const material = new THREE.MeshPhysicalMaterial({
        map: texture,
        transparent: true,
        roughness: glass ? 0.18 : 0.42,
        metalness: 0.05,
        transmission: glass ? 0.28 : 0.02,
        clearcoat: 0.5,
        clearcoatRoughness: 0.2,
        side: THREE.DoubleSide
      });
      return new THREE.Mesh(geometry, material);
    }

    const blueCard = createPlane(createCardTexture("blue"), 3.4, 2.1, true);
    blueCard.position.set(-2.7, 3.3, -1.2);
    blueCard.rotation.set(-0.08, 0.35, 0.03);
    world.add(blueCard);

    const creamCard = createPlane(createCardTexture("cream"), 3.0, 1.7, true);
    creamCard.position.set(0.7, 3.1, 0.7);
    creamCard.rotation.set(0.10, -0.38, -0.02);
    world.add(creamCard);

    const headingCard = createPlane(createCardTexture("dark"), 4.0, 2.0, false);
    headingCard.position.set(-1.4, -1.0, 0.2);
    headingCard.rotation.set(-0.08, 0.22, 0.01);
    world.add(headingCard);

    const label1 = createPlane(createLabelTexture("Professional"), 1.55, 0.48, false);
    label1.position.set(0.2, 0.4, 1.2);
    label1.rotation.set(-0.08, 0.28, 0.05);
    world.add(label1);

    const label2 = createPlane(createLabelTexture("Ethereal"), 1.35, 0.46, false);
    label2.position.set(1.15, 0.95, 1.45);
    label2.rotation.set(0.03, -0.18, -0.06);
    world.add(label2);

    const orbMaterial = new THREE.ShaderMaterial({
      uniforms: {
        colorA: { value: new THREE.Color("#f0d596") },
        colorB: { value: new THREE.Color("#dea66d") },
        colorC: { value: new THREE.Color("#b8dfe2") }
      },
      vertexShader: `
        varying vec3 vNormal;
        void main() {
          vNormal = normalize(normalMatrix * normal);
          gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
      `,
      fragmentShader: `
        uniform vec3 colorA;
        uniform vec3 colorB;
        uniform vec3 colorC;
        varying vec3 vNormal;
        void main() {
          float top = smoothstep(-0.4, 0.9, vNormal.y);
          float side = smoothstep(-0.3, 0.9, vNormal.x);
          vec3 col = mix(colorB, colorA, top);
          col = mix(col, colorC, side * 0.6);
          gl_FragColor = vec4(col, 1.0);
        }
      `
    });

    const orb = new THREE.Mesh(
      new THREE.SphereGeometry(1.1, 64, 64),
      orbMaterial
    );
    orb.position.set(-2.65, 0.05, 1.35);
    world.add(orb);

    const box = new THREE.Mesh(
      new THREE.BoxGeometry(1.45, 1.45, 1.45),
      new THREE.MeshPhysicalMaterial({
        color: 0x7a2d08,
        emissive: 0x351200,
        emissiveIntensity: 0.65,
        roughness: 0.35,
        metalness: 0.03
      })
    );
    box.position.set(1.95, -0.78, 1.15);
    box.rotation.set(0.2, -0.58, 0.08);
    world.add(box);

    const innerBox = new THREE.Mesh(
      new THREE.BoxGeometry(1.0, 1.0, 1.0),
      new THREE.MeshBasicMaterial({
        color: 0xff8b2f,
        transparent: true,
        opacity: 0.92
      })
    );
    innerBox.position.set(0.08, 0.02, 0.04);
    box.add(innerBox);

    const starsGeometry = new THREE.BufferGeometry();
    const starCount = 600;
    const positions = new Float32Array(starCount * 3);

    for (let i = 0; i < starCount; i++) {
      const r = 18 + Math.random() * 18;
      const a = Math.random() * Math.PI * 2;
      const y = (Math.random() - 0.5) * 12;
      positions[i * 3] = Math.cos(a) * r;
      positions[i * 3 + 1] = y;
      positions[i * 3 + 2] = Math.sin(a) * r;
    }

    starsGeometry.setAttribute("position", new THREE.BufferAttribute(positions, 3));

    const stars = new THREE.Points(
      starsGeometry,
      new THREE.PointsMaterial({
        color: 0xffffff,
        size: 0.03,
        transparent: true,
        opacity: 0.6
      })
    );
    scene.add(stars);

    const items = [
      { obj: blueCard, baseY: blueCard.position.y, speed: 0.75, amp: 0.16 },
      { obj: creamCard, baseY: creamCard.position.y, speed: 0.65, amp: 0.12 },
      { obj: headingCard, baseY: headingCard.position.y, speed: 0.90, amp: 0.09 },
      { obj: label1, baseY: label1.position.y, speed: 1.10, amp: 0.06 },
      { obj: label2, baseY: label2.position.y, speed: 1.30, amp: 0.05 },
      { obj: orb, baseY: orb.position.y, speed: 0.80, amp: 0.13 },
      { obj: box, baseY: box.position.y, speed: 0.70, amp: 0.08 }
    ];

    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);

      const t = clock.getElapsedTime();

      world.rotation.y = Math.sin(t * 0.22) * 0.16;
      world.rotation.x = Math.cos(t * 0.17) * 0.03;

      items.forEach((item, i) => {
        item.obj.position.y = item.baseY + Math.sin(t * item.speed + i) * item.amp;
      });

      orb.rotation.y += 0.0035;
      box.rotation.y += 0.006;
      box.rotation.x += 0.0015;
      innerBox.rotation.y -= 0.01;
      innerBox.rotation.x += 0.008;

      stars.rotation.y = t * 0.01;

      camera.position.x = Math.sin(t * 0.16) * 0.8;
      camera.position.y = 1.2 + Math.cos(t * 0.21) * 0.18;
      camera.lookAt(0, 0.4, 0);

      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
