<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Floating Showcase</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: Inter, Arial, sans-serif;
    }

    canvas {
      display: block;
    }

    .hud {
      position: fixed;
      left: 16px;
      bottom: 16px;
      z-index: 10;
      padding: 10px 14px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(10px);
      color: rgba(255,255,255,0.75);
      font-size: 12px;
      letter-spacing: 0.03em;
      user-select: none;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="hud">drag = orbit • wheel = zoom</div>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.161.0/build/three.module.js";
    import { OrbitControls } from "https://unpkg.com/three@0.161.0/examples/jsm/controls/OrbitControls.js";
    import { EffectComposer } from "https://unpkg.com/three@0.161.0/examples/jsm/postprocessing/EffectComposer.js";
    import { RenderPass } from "https://unpkg.com/three@0.161.0/examples/jsm/postprocessing/RenderPass.js";
    import { UnrealBloomPass } from "https://unpkg.com/three@0.161.0/examples/jsm/postprocessing/UnrealBloomPass.js";
    import { AfterimagePass } from "https://unpkg.com/three@0.161.0/examples/jsm/postprocessing/AfterimagePass.js";

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x000000);
    scene.fog = new THREE.Fog(0x000000, 10, 30);

    const camera = new THREE.PerspectiveCamera(
      42,
      window.innerWidth / window.innerHeight,
      0.1,
      100
    );
    camera.position.set(0, 1.3, 10.5);

    const renderer = new THREE.WebGLRenderer({
      antialias: true,
      alpha: false,
      powerPreference: "high-performance"
    });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.06;
    controls.enablePan = false;
    controls.minDistance = 6;
    controls.maxDistance = 16;
    controls.target.set(0, 0.4, 0);

    const composer = new EffectComposer(renderer);
    composer.addPass(new RenderPass(scene, camera));

    const bloom = new UnrealBloomPass(
      new THREE.Vector2(window.innerWidth, window.innerHeight),
      0.8,
      0.9,
      0.15
    );
    composer.addPass(bloom);

    const afterimage = new AfterimagePass();
    afterimage.uniforms["damp"].value = 0.93;
    composer.addPass(afterimage);

    const ambient = new THREE.AmbientLight(0xffffff, 0.75);
    scene.add(ambient);

    const dir1 = new THREE.DirectionalLight(0xffc58a, 2.2);
    dir1.position.set(-4, 5, 8);
    scene.add(dir1);

    const dir2 = new THREE.DirectionalLight(0x7db7ff, 1.1);
    dir2.position.set(5, 2, -2);
    scene.add(dir2);

    const point = new THREE.PointLight(0xff7a1a, 7, 20, 2);
    point.position.set(2.5, 0.8, 2.8);
    scene.add(point);

    const world = new THREE.Group();
    scene.add(world);

    function roundedRect(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    function makeCardTexture({
      width = 1024,
      height = 640,
      bg = "#101010",
      border = "rgba(255,255,255,0.20)",
      title = "Heading",
      subtitle = "This is your paragraph flow.",
      kicker = "FONTS",
      variant = "dark"
    } = {}) {
      const canvas = document.createElement("canvas");
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext("2d");

      const grad = ctx.createLinearGradient(0, 0, width, height);
      if (variant === "blue") {
        grad.addColorStop(0, "#13314f");
        grad.addColorStop(0.4, "#2a7bc2");
        grad.addColorStop(1, "#11161e");
      } else if (variant === "cream") {
        grad.addColorStop(0, "#f0eadf");
        grad.addColorStop(1, "#dfd7cb");
      } else {
        grad.addColorStop(0, "#101112");
        grad.addColorStop(1, "#050505");
      }

      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, width, height);

      ctx.strokeStyle = border;
      ctx.lineWidth = 3;
      ctx.strokeRect(2, 2, width - 4, height - 4);

      if (variant === "blue") {
        ctx.fillStyle = "rgba(255,255,255,0.95)";
        ctx.font = "900 110px Inter, Arial";
        ctx.fillText("ANY", 70, 150);
        ctx.fillText("DAY", 70, 260);

        const g = ctx.createLinearGradient(0, 0, 0, height);
        g.addColorStop(0, "#f7d28b");
        g.addColorStop(1, "#d67923");
        ctx.fillStyle = g;
        ctx.fillRect(500, 110, 170, 250);

        ctx.fillStyle = "rgba(255,255,255,0.35)";
        ctx.fillRect(460, 100, 250, 25);

        ctx.strokeStyle = "rgba(255,255,255,0.28)";
        ctx.strokeRect(470, 85, 230, 280);

        ctx.fillStyle = "rgba(255,255,255,0.85)";
        roundedRect(ctx, 720, 45, 230, 72, 22);
        ctx.fill();
        ctx.fillStyle = "#203245";
        ctx.font = "700 24px Inter, Arial";
        ctx.fillText("NEW LAYOUT", 775, 89);
      }

      if (variant === "cream") {
        ctx.fillStyle = "#2f241a";
        ctx.font = "500 78px Georgia, serif";
        ctx.fillText("Faun", 84, 185);

        ctx.strokeStyle = "rgba(43,28,18,0.50)";
        ctx.lineWidth = 8;
        ctx.beginPath();
        ctx.moveTo(700, 55);
        ctx.quadraticCurveTo(615, 200, 520, 350);
        ctx.quadraticCurveTo(605, 305, 695, 285);
        ctx.quadraticCurveTo(790, 255, 870, 98);
        ctx.stroke();

        ctx.fillStyle = "rgba(47,36,26,0.65)";
        ctx.font = "400 20px Inter, Arial";
        ctx.fillText("minimal editorial card", 88, 235);
      }

      if (variant === "dark") {
        ctx.fillStyle = "rgba(255,255,255,0.75)";
        ctx.font = "500 28px Inter, Arial";
        ctx.fillText(kicker, 44, 70);

        ctx.fillStyle = "rgba(255,255,255,0.95)";
        ctx.font = "500 114px Georgia, serif";
        ctx.fillText(title, 40, 210);

        ctx.fillStyle = "rgba(255,255,255,0.75)";
        ctx.font = "400 34px Inter, Arial";
        ctx.fillText(subtitle, 42, 300);
      }

      const texture = new THREE.CanvasTexture(canvas);
      texture.colorSpace = THREE.SRGBColorSpace;
      return texture;
    }

    function makeLabelTexture(text) {
      const canvas = document.createElement("canvas");
      canvas.width = 512;
      canvas.height = 160;
      const ctx = canvas.getContext("2d");

      ctx.clearRect(0, 0, canvas.width, canvas.height);

      roundedRect(ctx, 10, 18, 492, 110, 44);
      ctx.fillStyle = "rgba(30,30,32,0.88)";
      ctx.fill();

      ctx.strokeStyle = "rgba(255,255,255,0.08)";
      ctx.lineWidth = 2;
      ctx.stroke();

      const glow = ctx.createLinearGradient(0, 0, 512, 0);
      glow.addColorStop(0, "rgba(255,255,255,0.05)");
      glow.addColorStop(0.5, "rgba(255,255,255,0.12)");
      glow.addColorStop(1, "rgba(255,255,255,0.03)");
      ctx.fillStyle = glow;
      roundedRect(ctx, 10, 18, 492, 110, 44);
      ctx.fill();

      ctx.fillStyle = "rgba(255,255,255,0.88)";
      ctx.font = "600 34px Inter, Arial";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(text, 256, 73);

      const texture = new THREE.CanvasTexture(canvas);
      texture.colorSpace = THREE.SRGBColorSpace;
      return texture;
    }

    function makeMiniControlTexture() {
      const canvas = document.createElement("canvas");
      canvas.width = 600;
      canvas.height = 220;
      const ctx = canvas.getContext("2d");

      roundedRect(ctx, 8, 10, 584, 200, 28);
      ctx.fillStyle = "rgba(44,52,54,0.92)";
      ctx.fill();

      ctx.strokeStyle = "rgba(255,255,255,0.08)";
      ctx.lineWidth = 2;
      ctx.stroke();

      ctx.fillStyle = "rgba(255,255,255,0.92)";
      ctx.font = "700 74px Inter, Arial";
      ctx.fillText("Aa", 44, 140);

      const boxX = 210;
      const boxY = 62;
      const size = 70;
      const gap = 24;

      ctx.fillStyle = "#ffffff";
      roundedRect(ctx, boxX, boxY, size, size, 10);
      ctx.fill();

      ctx.fillStyle = "#7e9286";
      roundedRect(ctx, boxX + size + gap, boxY, size, size, 10);
      ctx.fill();

      ctx.fillStyle = "#e6e1dc";
      roundedRect(ctx, boxX + 2 * (size + gap), boxY, size, size, 10);
      ctx.fill();

      const texture = new THREE.CanvasTexture(canvas);
      texture.colorSpace = THREE.SRGBColorSpace;
      return texture;
    }

    function createPlane(texture, w, h) {
      const geo = new THREE.PlaneGeometry(w, h);
      const mat = new THREE.MeshPhysicalMaterial({
        map: texture,
        transparent: true,
        transmission: 0.08,
        roughness: 0.42,
        metalness: 0.08,
        clearcoat: 0.28,
        clearcoatRoughness: 0.35,
        side: THREE.DoubleSide
      });
      return new THREE.Mesh(geo, mat);
    }

    function createGlassPlane(texture, w, h) {
      const geo = new THREE.PlaneGeometry(w, h);
      const mat = new THREE.MeshPhysicalMaterial({
        map: texture,
        transparent: true,
        opacity: 0.95,
        transmission: 0.32,
        roughness: 0.18,
        metalness: 0.02,
        clearcoat: 0.9,
        clearcoatRoughness: 0.12,
        side: THREE.DoubleSide
      });
      return new THREE.Mesh(geo, mat);
    }

    function addSoftShadow(w, h, opacity = 0.22) {
      const canvas = document.createElement("canvas");
      canvas.width = 512;
      canvas.height = 256;
      const ctx = canvas.getContext("2d");

      const g = ctx.createRadialGradient(256, 128, 20, 256, 128, 180);
      g.addColorStop(0, `rgba(0,0,0,${opacity})`);
      g.addColorStop(1, "rgba(0,0,0,0)");
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, 512, 256);

      const tex = new THREE.CanvasTexture(canvas);
      const mat = new THREE.MeshBasicMaterial({
        map: tex,
        transparent: true,
        depthWrite: false
      });
      const mesh = new THREE.Mesh(new THREE.PlaneGeometry(w, h), mat);
      return mesh;
    }

    const rig = new THREE.Group();
    world.add(rig);

    const blueCard = createGlassPlane(
      makeCardTexture({ variant: "blue" }),
      3.45,
      2.15
    );
    blueCard.position.set(-2.65, 3.4, -1.4);
    blueCard.rotation.set(-0.08, 0.35, 0.03);
    rig.add(blueCard);

    const creamCard = createGlassPlane(
      makeCardTexture({ variant: "cream" }),
      3.1,
      1.7
    );
    creamCard.position.set(0.55, 3.25, 0.6);
    creamCard.rotation.set(0.1, -0.42, -0.02);
    rig.add(creamCard);

    const headingCard = createPlane(
      makeCardTexture({
        variant: "dark",
        title: "Heading",
        subtitle: "This is your paragraph flow."
      }),
      4.1,
      2.1
    );
    headingCard.position.set(-1.4, -0.95, 0.25);
    headingCard.rotation.set(-0.08, 0.24, 0.015);
    rig.add(headingCard);

    const headingShadow = addSoftShadow(4.2, 2.0, 0.35);
    headingShadow.position.copy(headingCard.position).add(new THREE.Vector3(0.12, -0.18, -0.15));
    headingShadow.rotation.copy(headingCard.rotation);
    rig.add(headingShadow);

    const label1 = createPlane(makeLabelTexture("Professional"), 1.55, 0.48);
    label1.position.set(0.2, 0.4, 1.2);
    label1.rotation.set(-0.08, 0.28, 0.05);
    rig.add(label1);

    const label2 = createPlane(makeLabelTexture("Ethereal"), 1.35, 0.46);
    label2.position.set(1.1, 0.95, 1.45);
    label2.rotation.set(0.03, -0.18, -0.06);
    rig.add(label2);

    const miniControl = createPlane(makeMiniControlTexture(), 1.95, 0.72);
    miniControl.position.set(-0.15, -1.05, 2.35);
    miniControl.rotation.set(-0.15, 0.18, 0.07);
    rig.add(miniControl);

    const sphereGeo = new THREE.SphereGeometry(1.12, 64, 64);
    const sphereMat = new THREE.ShaderMaterial({
      uniforms: {
        colorA: { value: new THREE.Color("#f0d596") },
        colorB: { value: new THREE.Color("#e4b07a") },
        colorC: { value: new THREE.Color("#b5d9df") },
        glow:   { value: 0.35 }
      },
      vertexShader: `
        varying vec3 vNormal;
        varying vec3 vWorldPosition;
        void main() {
          vNormal = normalize(normalMatrix * normal);
          vec4 worldPosition = modelMatrix * vec4(position, 1.0);
          vWorldPosition = worldPosition.xyz;
          gl_Position = projectionMatrix * viewMatrix * worldPosition;
        }
      `,
      fragmentShader: `
        uniform vec3 colorA;
        uniform vec3 colorB;
        uniform vec3 colorC;
        uniform float glow;
        varying vec3 vNormal;
        varying vec3 vWorldPosition;
        void main() {
          vec3 n = normalize(vNormal);
          float top = smoothstep(-0.3, 0.8, n.y);
          float right = smoothstep(-0.4, 0.9, n.x);
          vec3 col = mix(colorB, colorA, top);
          col = mix(col, colorC, right * 0.7);
          float fres = pow(1.0 - abs(dot(n, vec3(0.0, 0.0, 1.0))), 2.0);
          col += fres * glow;
          gl_FragColor = vec4(col, 1.0);
        }
      `
    });
    const orb = new THREE.Mesh(sphereGeo, sphereMat);
    orb.position.set(-2.65, 0.05, 1.35);
    rig.add(orb);

    const smallOrb = new THREE.Mesh(
      new THREE.SphereGeometry(0.08, 32, 32),
      new THREE.MeshBasicMaterial({ color: 0xf2b589 })
    );
    smallOrb.position.set(-3.2, 0.45, 2.05);
    rig.add(smallOrb);

    const box = new THREE.Mesh(
      new THREE.BoxGeometry(1.45, 1.45, 1.45),
      new THREE.MeshPhysicalMaterial({
        color: 0x7f2f09,
        emissive: 0x3a1300,
        emissiveIntensity: 0.55,
        roughness: 0.35,
        metalness: 0.05,
        transmission: 0.02,
        clearcoat: 0.12
      })
    );
    box.position.set(1.95, -0.78, 1.15);
    box.rotation.set(0.2, -0.58, 0.08);
    rig.add(box);

    const innerBox = new THREE.Mesh(
      new THREE.BoxGeometry(1.0, 1.0, 1.0),
      new THREE.MeshBasicMaterial({
        color: 0xff8b2f,
        transparent: true,
        opacity: 0.9
      })
    );
    innerBox.position.set(0.08, 0.02, 0.04);
    box.add(innerBox);

    const ringGlow = new THREE.Mesh(
      new THREE.PlaneGeometry(8, 8),
      new THREE.ShaderMaterial({
        transparent: true,
        depthWrite: false,
        uniforms: {
          c1: { value: new THREE.Color("#ff8f34") },
          c2: { value: new THREE.Color("#6fd7ff") }
        },
        vertexShader: `
          varying vec2 vUv;
          void main() {
            vUv = uv;
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
          }
        `,
        fragmentShader: `
          uniform vec3 c1;
          uniform vec3 c2;
          varying vec2 vUv;
          void main() {
            vec2 uv = vUv - 0.5;
            float d = length(uv);
            float a = smoothstep(0.42, 0.0, d) * 0.18;
            vec3 col = mix(c1, c2, vUv.x * 0.7 + vUv.y * 0.3);
            gl_FragColor = vec4(col, a);
          }
        `
      })
    );
    ringGlow.position.set(-0.1, 0.25, -2.6);
    ringGlow.rotation.x = -0.3;
    world.add(ringGlow);

    const stars = new THREE.BufferGeometry();
    const starCount = 650;
    const starPos = new Float32Array(starCount * 3);

    for (let i = 0; i < starCount; i++) {
      const r = 18 + Math.random() * 16;
      const a = Math.random() * Math.PI * 2;
      const y = (Math.random() - 0.5) * 12;
      starPos[i * 3] = Math.cos(a) * r;
      starPos[i * 3 + 1] = y;
      starPos[i * 3 + 2] = Math.sin(a) * r;
    }

    stars.setAttribute("position", new THREE.BufferAttribute(starPos, 3));
    const starField = new THREE.Points(
      stars,
      new THREE.PointsMaterial({
        color: 0xffffff,
        size: 0.03,
        transparent: true,
        opacity: 0.65,
        depthWrite: false
      })
    );
    scene.add(starField);

    const floatingItems = [
      { obj: blueCard, speed: 0.75, amp: 0.16, rx: 0.02, ry: 0.03 },
      { obj: creamCard, speed: 0.65, amp: 0.12, rx: 0.03, ry: 0.018 },
      { obj: headingCard, speed: 0.9, amp: 0.09, rx: 0.025, ry: 0.025 },
      { obj: label1, speed: 1.1, amp: 0.06, rx: 0.01, ry: 0.06 },
      { obj: label2, speed: 1.3, amp: 0.05, rx: 0.02, ry: 0.05 },
      { obj: miniControl, speed: 1.0, amp: 0.07, rx: 0.03, ry: 0.04 },
      { obj: orb, speed: 0.8, amp: 0.13, rx: 0.015, ry: 0.02 },
      { obj: box, speed: 0.7, amp: 0.08, rx: 0.06, ry: 0.08 }
    ];

    const baseStates = floatingItems.map(item => ({
      pos: item.obj.position.clone(),
      rot: item.obj.rotation.clone()
    }));

    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);

      const t = clock.getElapsedTime();

      world.rotation.y = Math.sin(t * 0.22) * 0.16;
      world.rotation.x = Math.cos(t * 0.17) * 0.035;

      ringGlow.material.uniforms.c1.value.offsetHSL(0.00015, 0, 0);
      ringGlow.rotation.z = t * 0.08;

      starField.rotation.y = t * 0.01;

      floatingItems.forEach((item, i) => {
        const base = baseStates[i];
        item.obj.position.y = base.pos.y + Math.sin(t * item.speed + i * 0.9) * item.amp;
        item.obj.position.x = base.pos.x + Math.cos(t * item.speed * 0.65 + i) * item.amp * 0.22;
        item.obj.rotation.x = base.rot.x + Math.sin(t * item.speed * 0.55 + i) * item.rx;
        item.obj.rotation.y = base.rot.y + Math.cos(t * item.speed * 0.5 + i) * item.ry;
      });

      orb.rotation.y += 0.0035;
      box.rotation.y += 0.006;
      box.rotation.x += 0.0015;
      innerBox.rotation.y -= 0.01;
      innerBox.rotation.x += 0.008;

      headingShadow.position.copy(headingCard.position).add(new THREE.Vector3(0.12, -0.18, -0.15));
      headingShadow.rotation.copy(headingCard.rotation);

      camera.position.x = Math.sin(t * 0.16) * 0.8;
      camera.position.y = 1.25 + Math.cos(t * 0.21) * 0.18;

      controls.update();
      composer.render();
    }

    animate();

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      composer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
